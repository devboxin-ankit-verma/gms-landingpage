<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none" role="img" aria-label="GMS AI workshop intelligence preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.35">
    <circle cx="200" cy="120" r="80" fill="#8B5CF6"/>
    <circle cx="1100" cy="600" r="120" fill="#8B5CF6"/>
  </g>
  <g class="grid-lines" stroke="#E5E7EB" stroke-width="1">
    <path d="M0 180H1280M0 360H1280M0 540H1280M320 0V720M640 0V720M960 0V720"/>
  </g>
  <rect x="120" y="100" width="520" height="520" rx="24" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="160" y="140" width="200" height="28" rx="8" fill="#EDE9FE"/>
  <rect x="160" y="190" width="440" height="120" rx="16" fill="#F8FAFC" stroke="#E5E7EB"/>
  <rect x="180" y="220" width="120" height="12" rx="4" fill="#8B5CF6" opacity="0.8"/>
  <rect x="180" y="244" width="280" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="180" y="264" width="200" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="160" y="340" width="200" height="100" rx="12" fill="#EDE9FE"/>
  <rect x="380" y="340" width="220" height="100" rx="12" fill="#F8FAFC" stroke="#E5E7EB"/>
  <rect x="160" y="460" width="440" height="120" rx="12" fill="#F8FAFC" stroke="#E5E7EB"/>
  <g class="pulse-node" filter="url(#glow)">
    <circle cx="260" cy="390" r="18" fill="url(#accent)"/>
    <circle cx="260" cy="390" r="28" stroke="#8B5CF6" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
  <g class="pulse-node delay-1">
    <circle cx="490" cy="390" r="14" fill="#8B5CF6"/>
    <circle cx="490" cy="390" r="22" stroke="#8B5CF6" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  <rect x="700" y="120" width="460" height="500" rx="24" fill="#111827" opacity="0.92"/>
  <rect x="740" y="160" width="380" height="200" rx="16" fill="#1F2937" stroke="#374151"/>
  <text x="760" y="200" fill="#EDE9FE" font-family="system-ui,sans-serif" font-size="22" font-weight="700">GMS AI</text>
  <text x="760" y="228" fill="#9CA3AF" font-family="system-ui,sans-serif" font-size="14">Garage Master À Live insights</text>
  <g class="scan-line">
    <rect x="760" y="280" width="340" height="4" rx="2" fill="#8B5CF6" opacity="0.9"/>
  </g>
  <rect x="760" y="300" width="280" height="8" rx="4" fill="#374151"/>
  <rect x="760" y="320" width="200" height="8" rx="4" fill="#374151"/>
  <rect x="760" y="380" width="160" height="48" rx="10" fill="url(#accent)"/>
  <text x="780" y="410" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">AI job card ready</text>
  <g class="orbit">
    <circle cx="1040" cy="480" r="60" stroke="#8B5CF6" stroke-width="2" fill="none" opacity="0.5"/>
    <circle cx="1040" cy="420" r="8" fill="#EDE9FE"/>
    <circle cx="1100" cy="480" r="6" fill="#8B5CF6"/>
    <circle cx="980" cy="500" r="5" fill="#A78BFA"/>
  </g>
  <style>
    .pulse-node { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    .pulse-node.delay-1 { animation-delay: 0.6s; }
    .scan-line { animation: scan 3s ease-in-out infinite; }
    .orbit { animation: spin 12s linear infinite; transform-origin: 1040px 480px; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }
    @keyframes scan {
      0%, 100% { transform: translateY(0); opacity: 0.9; }
      50% { transform: translateY(48px); opacity: 0.4; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    svg:not(.playing) .pulse-node,
    svg:not(.playing) .scan-line,
    svg:not(.playing) .orbit { animation-play-state: paused; }
  </style>
</svg>
